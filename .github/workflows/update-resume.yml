name: Update Resume PDF

on:
  workflow_dispatch: # Manual trigger from GitHub UI or CLI
  schedule:
    # Runs daily at 6 AM UTC (1 AM EST / 10 PM PST)
    # Change to '0 6 * * 0' for weekly (Sundays only) when no longer job hunting
    - cron: '0 6 * * *'

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4

      - name: Clone Overleaf project
        run: |
          git clone "https://${{ secrets.OVERLEAF_EMAIL }}:${{ secrets.OVERLEAF_PASSWORD }}@git.overleaf.com/${{ secrets.OVERLEAF_PROJECT_ID }}" overleaf-resume

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: overleaf-resume

      - name: Copy PDF to public folder
        run: cp overleaf-resume/main.pdf public/resume.pdf

      - name: Check for changes and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/resume.pdf
          if git diff --cached --quiet; then
            echo "No changes to resume PDF, skipping commit."
          else
            git commit -m "Update resume PDF from Overleaf"
            git push
          fi
